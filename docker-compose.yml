# Auto-Deploy: 注册 · 接入 · 中转 · 可观测
#
# 四层一体（本地 Docker 部署）:
#   registration  自动注册 Grok / Codex / Gemini（Claude 走手动接入）
#   relay         OpenAI 兼容中转，账号池轮询 + 故障转移
#   dashboard     可视化控制台（账号状态 / 实时请求流 / 接入）
#   shared volume /data 存放 accounts.db（三层共用同一数据源）
#
# 启动:  docker compose up -d --build
# 面板:  http://localhost:8080
# 中转:  http://localhost:8000/v1/chat/completions
# 注册:  docker compose exec registration python service.py --provider grok --count 1

services:
  relay:
    build:
      context: .
      dockerfile: relay/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - data:/data
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    ports:
      - "8080:8080"
    environment:
      RELAY_URL: "http://relay:8000"
      REG_URL: "http://registration:8001"
    depends_on:
      - relay
      - registration
    restart: unless-stopped

  registration:
    build:
      context: .
      dockerfile: registration/Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - data:/data
    environment:
      DB_PATH: "/data/accounts.db"
      PYTHONPATH: "/app"
      MODE: "server"
    depends_on:
      - relay
    restart: unless-stopped

volumes:
  data:
